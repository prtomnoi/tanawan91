services:
  web1:
    build: .
    container_name: web1
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    networks:
      - proxy
    labels:
      - traefik.enable=true
      - traefik.http.routers.web1.rule=Host(`web1.dekesandev.com`)
      - traefik.http.routers.web1.entrypoints=web
      - traefik.http.services.web1.loadbalancer.server.port=3000

networks:
  proxy:
    external: true